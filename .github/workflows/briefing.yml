name: Build Daily Briefing

on:
  schedule:
    - cron: '*/30 * * * *'  # Breaking news check every 30 min
    - cron: '0 */2 * * *'   # Full rebuild every 2 hours
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (full, breaking_only, category, deploy_only)'
        required: false
        default: 'full'
      category:
        description: 'Category to refresh (australia, archaeology, football, world_topics)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news fetch script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.mode || (github.event.schedule == '*/30 * * * *' && 'breaking_only' || 'full') }}
          RUN_CATEGORY: ${{ github.event.inputs.category || '' }}
        run: python fetch_news.py

      - name: Commit memory file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add memory.json health.json || true
          git diff --staged --quiet || git commit -m "Update story memory"
          git push || true

      - name: Deploy to Cloudflare Pages
        if: hashFiles('dist/.deploy_needed') != ''
        run: |
          npm install -g wrangler
          wrangler pages deploy dist --project-name=daily-briefing --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
