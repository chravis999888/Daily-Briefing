<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 32" width="200" height="32" role="img">
  <title>Daily Briefing</title>
  <desc>Daily Briefing news dashboard logo — pulse dot with wordmark</desc>
  <!-- Pulse rings -->
  <circle cx="14" cy="16" r="12" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.25"/>
  <circle cx="14" cy="16" r="8" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.45"/>
  <!-- Core dot -->
  <circle cx="14" cy="16" r="4.5" fill="#c0392b"/>
  <!-- Wordmark -->
  <text x="32" y="22" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#e8e4dc" letter-spacing="0.02em">Daily Briefing</text>
</svg>
